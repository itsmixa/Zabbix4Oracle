    - uuid: c55035a422d44c25b13bb08af3f0db20
      expression: 'last(/Oracle MX v.0.2/oracle.ALERTLOG_ERROR_COUNT)>0 and length(last(/Oracle MX v.0.2/db.odbc.get[get_alertlog_messages,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]))>0'
