zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 748ad4d098d447d492bb935c907f652f
      name: Templates/Databases
  templates:
    - uuid: edd1c155f008473ebe049cefafe6b809
      template: 'Oracle MX v.0.2'
      name: 'Oracle MX v.0.2'
      description: |
        1. Create an Oracle user for monitoring.
        
        2. Set the user name and password in host macros ({$ORACLE.USER} and {$ORACLE.PASSWORD}).
          Do not forget to install the Microsoft ODBC driver on the Zabbix server or the Zabbix proxy.
          See Oracle documentation for instructions: https://www.oracle.com/database/technologies/releasenote-odbc-ic.html.
        
          Note! Credentials in the odbc.ini do not work for Oracle.
          Note! Be sure that ODBC connects to Oracle with session parameter NLS_NUMERIC_CHARACTERS= '.,' It is important for correct display float numbers in Zabbix.
        The "Service's TCP port state" item uses {$ORACLE.HOST} and {$ORACLE.PORT} macros to check the availability of the listener.
        
        
        Template tooling version used: 0.40
      groups:
        - name: Templates/Databases
      items:
        - uuid: 758aeb7e4e78401a830cf3768a88c87d
          name: 'Oracle: Get alertlog messages'
          type: ODBC
          key: 'db.odbc.get[get_alertlog_messages,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 1h
          history: 30d
          value_type: TEXT
          trends: '0'
          params: 'select originating_timestamp dt, message_text msg from V$DIAG_ALERT_EXT where originating_timestamp>sysdate-1/24 and (message_level=1 or message_type in (2,3));'
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: 'The item gets the system metric values.'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: 901755f25fee4b72b7d7c3ca81cd523a
          name: 'Oracle: Get alertlog metrics'
          type: ODBC
          key: 'db.odbc.get[get_alertlog_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 2m;m0-59
          history: '0'
          value_type: TEXT
          trends: '0'
          params: 'select ''ALERTLOG_ERROR_COUNT'' metric,count(*) value from V$DIAG_ALERT_EXT where originating_timestamp>sysdate-1 and (message_level=1 or message_type in (2,3));'
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: 'The item gets the alertlog metric values.'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: f076b2202d7d4f3ab3ed5c6ff9163d01
          name: 'Oracle: Get archive dest info'
          type: ODBC
          key: 'db.odbc.get[get_archivelog_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 2m
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            with current_seq as (select max(log_sequence) seq from v$archive_dest where status='VALID' and target='PRIMARY')
            SELECT
            d.dest_name, DECODE (d.status, 'VALID',3, 'DEFERRED', 2, 'ERROR', 1, 0) AS status,
            d.log_sequence,
            d.error,
            cs.seq-d.log_sequence transfer_lag
            FROM v$archive_dest d , v$database db, current_seq cs
            WHERE d.status != 'INACTIVE' AND db.log_mode = 'ARCHIVELOG';
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: 8b6e5dce7fe347eab7f2bfe9f4b9afaf
          name: 'Oracle: Get ASM stats'
          type: ODBC
          key: 'db.odbc.get[get_asm_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 2m
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            SELECT
            name AS dg_name,
            trunc(total_mb/DECODE(TYPE, 'NORMAL', 2, 'HIGH', 3, 'EXTERN', 1)*1024*1024) AS size_byte,
            trunc(usable_file_mb*1024*1024 ) AS free_size_byte,
            trunc(total_mb/DECODE(TYPE, 'NORMAL', 2, 'HIGH', 3, 'EXTERN', 1)*1024*1024)-trunc(usable_file_mb*1024*1024 ) used_byte
            FROM v$asm_diskgroup;
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: 'Get ASM disk groups stats.'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: 3e461d8fce294dc8a8e89eeadb4ccb5d
          name: 'Oracle: Get backup metrics'
          type: ODBC
          key: 'db.odbc.get[get_backup_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 2m
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            select 'BACKUP::'||btp.TYPE_NAME name, nvl(bkp.value,0) value from 
            (SELECT type, greatest((sysdate-max(completion_time))*24*60*60,0) value
            FROM
            (
            SELECT
            CASE
              WHEN s.backup_type='L' THEN 'ARCHIVELOG'
              WHEN s.controlfile_included in ('YES') THEN 'CONTROLFILE'
              WHEN s.controlfile_included in ('SBY') THEN 'CONTROLFILE_STB'
              WHEN s.backup_type in ('I','D') AND s.incremental_level=0 THEN 'LEVEL0'
              WHEN s.backup_type='I' AND s.incremental_level=1 THEN 'LEVEL1'
              WHEN s.backup_type='D' AND s.incremental_level is null and s.controlfile_included not in ('YES','SBY') THEN 'FULL'
            END type,
            s.completion_time
            FROM v$backup_piece p, v$backup_set s
            WHERE p.status='A' AND s.set_stamp = p.set_stamp
               and s.set_count  = p.set_count
            )
            GROUP BY type) bkp, (select decode(level,1,'ARCHIVELOG',2,'CONTROLFILE', 3,'CONTROLFILE_STB',4,'LEVEL0',5,'LEVEL1',6,'FULL') type_name from dual connect by level<=6) btp
            where bkp.type(+)=btp.type_name
            UNION ALL
            select 'BACKUP::NOT_BAKED_UP_COUNT',count(*) count from v$dbfile where file# not in (select file# from v$backup_datafile bd, v$backup_piece p  where (bd.incremental_level=0 or bd.incremental_level is null) and bd.set_stamp = p.set_stamp  and bd.set_count = p.set_count and p.status='A');
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: 'The item gets the backups info.'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: 9f6106df90534003aaf1655acfaf4527
          name: 'Oracle: Get Standby metrics'
          type: ODBC
          key: 'db.odbc.get[get_standby_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 0;m0-59
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            select 'STANDBY::MRP0 status' metric, status value from v$managed_standby s where process='MRP0'
            union all
            SELECT 'STANDBY::'||name, to_char((EXTRACT(DAY FROM to_dsinterval(ds.VALUE)) * 86400) +
            (EXTRACT(HOUR FROM to_dsinterval(VALUE)) * 3600) +
            (EXTRACT(MINUTE FROM to_dsinterval(VALUE)) * 60) +
            EXTRACT(SECOND FROM to_dsinterval(VALUE)))  value FROM V$DATAGUARD_STATS ds WHERE NAME in ('apply lag','transport lag')
            union all
            select s.name, to_char(s.value) from (select 'STANDBY::MRP0 started' name, count(*) value from v$managed_standby where process='MRP0') s, v$database d where d.DATABASE_ROLE='PHYSICAL STANDBY';
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: |
            All metrics relevant just for Physical Standby.
            Turn off them on the Primary.
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: b42f86b809ff46c382e1c016c74ea1c4
          name: 'Oracle: Get Standby Transfer Lag'
          type: ODBC
          key: 'db.odbc.get[get_standby_transfer_lag_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 10m;m0-59
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            select 'lag_seq' metric, nvl((select max(log_sequence) from v$archive_dest where status='VALID' and target='PRIMARY')-
            (select min(log_sequence) from v$archive_dest where status='VALID' and target='STANDBY'),0) value
            from dual;
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: 'The item gets the standby transfer lag metric values.'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: d85f0043c52147abacef7a12712facb2
          name: 'Oracle: Get system metrics'
          type: ODBC
          key: 'db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 0;m0-59
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            SELECT 'SYSPARAM::' || name METRIC, to_number(VALUE) VALUE
              FROM V$SYSTEM_PARAMETER WHERE NAME IN ('sessions', 'processes', 'db_files')
            union all
             SELECT 'SESSION::Locked now' ,count(*) FROM V$SESSION s WHERE s.BLOCKING_SESSION IS NOT NULL AND s.BLOCKING_SESSION_STATUS='VALID' AND s.SECONDS_IN_WAIT > 0
            union all
             SELECT 'SESSION::Long time locked' ,count(*) FROM V$SESSION s WHERE s.BLOCKING_SESSION IS NOT NULL AND s.BLOCKING_SESSION_STATUS='VALID' AND s.SECONDS_IN_WAIT > {$ORACLE.SESSION.LOCK.MAX.TIME}
            union all
             SELECT 'SESSION::Total', COUNT(*) FROM V$SESSION
            union all
             SELECT 'SESSION::Active Foreground', COUNT(*) FROM V$SESSION where status='ACTIVE' and username is not null
            union all
             SELECT 'FRA::Space Limit', space_limit FROM V$RECOVERY_FILE_DEST
            union all
             SELECT 'FRA::Space Used', space_used FROM V$RECOVERY_FILE_DEST
            union all
             SELECT 'FRA::Space Reclaimable', space_reclaimable FROM V$RECOVERY_FILE_DEST
            union all
             SELECT 'FRA::Number Of Files', number_of_files FROM V$RECOVERY_FILE_DEST
            union all
             SELECT 'FRA::Space Free', DECODE(space_limit, 0, 0,space_limit-(space_used-space_reclaimable)) FROM V$RECOVERY_FILE_DEST
            union all
             SELECT 'PROC::Procnum', COUNT(*) FROM v$process
            union all
             SELECT 'DATABASE::Datafiles Count', COUNT(*) FROM v$datafile
            union all
             SELECT 'REDO::Available', count(*) from v$log t where t.status in ('INACTIVE', 'UNUSED')
            union all
             SELECT 'USER::Expire password', ROUND(DECODE(SIGN(NVL(u.expiry_date, SYSDATE + 999) - SYSDATE),-1, 0, NVL(u.expiry_date, SYSDATE + 999) - SYSDATE)) exp_passwd_days_before
            FROM dba_users u WHERE username = UPPER('{$ORACLE.USER}')
            union all
             select 'DATABASE::Size', sum(bytes) from v$datafile
            union all
            select 'INSTANCE::Startup time', (startup_time-to_date('01011970', 'ddmmyyyy'))*24*60*60 from v$instance;
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: 'The item gets the system metric values.'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: a169362432764f1e864ffe86d38a53f9
          name: 'Oracle: Get tablespaces stats'
          type: ODBC
          key: 'db.odbc.get[get_tablespaces_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 10m
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            select dta.tablespace_name tablespace,dta.contents, DECODE(dta.status, 'ONLINE', 1, 'OFFLINE', 2, 'READ ONLY', 3, 0) STATUS,a.file_bytes,a.max_bytes,a.free free_bytes,a.used_bytes,a.used_max_pct*100 used_max_pct from (
            select ts.tablespace_name tablespace_name, ts.file_bytes, ts.max_bytes, ts.max_bytes-nvl((u.blocks_used*ts.block_size),0) free,
            nvl(u.blocks_used*ts.block_size,0) used_bytes,
            round(nvl(u.blocks_used,0)*ts.block_size/ts.max_bytes,2) used_max_pct
            from 
            (select tablespace, sum(blocks) blocks_used from v$tempseg_usage group by tablespace) u,
            (select t.tablespace_name, t.block_size, sum(f.bytes) file_bytes, sum(decode(f.autoextensible,'YES',f.maxbytes,f.bytes)) max_bytes from
            dba_tablespaces t,dba_temp_files f where t.tablespace_name=f.tablespace_name
            group by t.tablespace_name, t.block_size) ts
            where u.tablespace(+)=ts.tablespace_name
            union all
            select ts.tablespace_name tablespace, ts.file_bytes, ts.max_bytes, ts.max_bytes-u.used_bytes free,
            u.used_bytes,
            round(u.used_bytes/ts.max_bytes,2) used_max_pct
            from 
            (SELECT ue.tablespace_name, SUM(ue.bytes * decode(ue.status, 'ACTIVE', 1, decode(ts.RETENTION, 'GUARANTEE', 1, 0))) AS used_bytes FROM dba_undo_extents ue, dba_tablespaces ts WHERE ue.status in ('ACTIVE', 'UNEXPIRED') AND ts.TABLESPACE_NAME = ue.TABLESPACE_NAME GROUP BY ue.tablespace_name) u,
            (select t.tablespace_name, sum(f.bytes) file_bytes, sum(decode(f.autoextensible,'YES',f.maxbytes,f.bytes)) max_bytes from
            dba_tablespaces t,dba_data_files f where t.tablespace_name=f.tablespace_name and contents='UNDO'
            group by t.tablespace_name) ts
            where u.tablespace_name=ts.tablespace_name
            union all
            select df.tablespace_name, sum(df.bytes) file_bytes, sum(df.max_bytes) max_bytes,
            sum(df.max_bytes)-(sum(df.bytes)-sum(nvl(f.free,0))) free,
            sum(df.bytes)-sum(nvl(f.free,0)) used_bytes,
            round((sum(df.bytes)-sum(nvl(f.free,0)))/sum(df.max_bytes),2) used_max_pct
            FROM (SELECT
               ddf.file_id,
               ddf.tablespace_name,
               ddf.bytes AS bytes,
               decode(ddf.autoextensible,'YES',ddf.maxbytes,ddf.bytes) AS max_bytes
               FROM
                dba_data_files ddf,
                dba_tablespaces dt
              WHERE
               ddf.tablespace_name = dt.tablespace_name and dt.contents='PERMANENT') df,
               (SELECT SUM(bytes) AS FREE, file_id FROM dba_free_space GROUP BY file_id) f
               WHERE df.file_id = f.file_id (+)
               GROUP BY df.tablespace_name) a, dba_tablespaces dta where a.tablespace_name=dta.tablespace_name;
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          description: 'Get tablespaces stats.'
          tags:
            - tag: Application
              value: 'Zabbix raw items'
        - uuid: 0802aa4e447f41a9bffd3ad2087c5d95
          name: 'Item in Not supported state'
          type: TRAP
          key: item_not_supported
          delay: '0'
          history: 2d
          value_type: TEXT
          trends: '0'
          description: |
            Zabbix Item in Not supported state.
            Go Configuration -> Hosts, select an appropriate Host and check its Items.
          triggers:
            - uuid: 48838ee4745e438c9ea56ae0caceb58b
              expression: 'right(last(/Oracle MX v.0.2/item_not_supported),2)<>"OK"'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'right(last(/Oracle MX v.0.2/item_not_supported),2)="OK"'
              name: 'Some Items in the "Not supported" state. Check the Items.'
              status: DISABLED
              priority: HIGH
              manual_close: 'YES'
        - uuid: ba5411b33e4e4284a35b069069ab1f19
          name: 'Oracle: Alertlog Error Count'
          type: DEPENDENT
          key: oracle.ALERTLOG_ERROR_COUNT
          delay: '0'
          history: 7d
          description: 'Alertlog Error Count.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.METRIC==''ALERTLOG_ERROR_COUNT'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_alertlog_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          tags:
            - tag: Application
              value: Oracle
        - uuid: 24108df79e1f466eb4a3e42181dbc09c
          name: 'Oracle: BKP, Archivelog backup'
          type: DEPENDENT
          key: oracle.alog_backup
          delay: '0'
          history: 7d
          units: s
          description: 'Archivelogs have been backed up this time ago.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.NAME==''BACKUP::ARCHIVELOG'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_backup_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          triggers:
            - uuid: efb75d35ed85447593a41d3007503129
              expression: 'last(/Oracle MX v.0.2/oracle.alog_backup)>{$ORACLE_ALOG_BACKUP_CRIT}'
              name: 'No archived logs backups'
              opdata: 'last: {ITEM.LASTVALUE1}, threshold: {$ORACLE_ALOG_BACKUP_CRIT}'
              priority: HIGH
              description: 'Archivelogs have not been backed up for a long time. Check out backup logs.'
            - uuid: 567d2a6f740c4c6d947eac0a8a9109ef
              expression: 'last(/Oracle MX v.0.2/oracle.alog_backup)>{$ORACLE_ALOG_BACKUP_WARN}'
              name: 'No archived logs backups'
              opdata: 'last: {ITEM.LASTVALUE1}, threshold: {$ORACLE_ALOG_BACKUP_WARN}'
              priority: WARNING
              description: 'Archivelogs have not been backed up for a long time. Check out backup system logs.'
              dependencies:
                - name: 'No archived logs backups'
                  expression: 'last(/Oracle MX v.0.2/oracle.alog_backup)>{$ORACLE_ALOG_BACKUP_CRIT}'
        - uuid: 9e616e20af3f41dd8c2667ef052aea0a
          name: 'Oracle: BKP, Controlfile backup'
          type: DEPENDENT
          key: oracle.cf_backup
          delay: '0'
          history: 7d
          units: s
          description: 'Controlfile has been backed up this time ago.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.NAME==''BACKUP::CONTROLFILE'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_backup_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          triggers:
            - uuid: df48b793895a4f8188c8752a33a7677a
              expression: 'last(/Oracle MX v.0.2/oracle.cf_backup)>{$ORACLE_CF_BACKUP_CRIT}'
              name: 'No controlfile backups'
              opdata: 'last: {ITEM.LASTVALUE1}, threshold: {$ORACLE_CF_BACKUP_CRIT}'
              priority: HIGH
              description: 'Controlfile has not been backed up for a long time. Check out backup logs.'
            - uuid: a7d7ce76379641b69953cd2f2d3bca44
              expression: 'last(/Oracle MX v.0.2/oracle.cf_backup)>{$ORACLE_CF_BACKUP_WARN}'
              name: 'No controlfile backups'
              opdata: 'last: {ITEM.LASTVALUE1}, threshold: {$ORACLE_CF_BACKUP_WARN}'
              priority: WARNING
              description: 'Controlfile has not been backed up for a long time. Check out backup logs.'
              dependencies:
                - name: 'No controlfile backups'
                  expression: 'last(/Oracle MX v.0.2/oracle.cf_backup)>{$ORACLE_CF_BACKUP_CRIT}'
        - uuid: 04c67c341f3d42e8aefcb3969a0dca6e
          name: 'Oracle: DATABASE, Datafiles Count'
          type: DEPENDENT
          key: oracle.dbfiles_count
          delay: '0'
          history: 7d
          description: 'Datafiles count.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.METRIC==''DATABASE::Datafiles Count'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          tags:
            - tag: Application
              value: Oracle
        - uuid: d6a8fbb8f4014ac6b06042e7004ecc48
          name: 'Oracle: PARAM, DBFiles limit'
          type: DEPENDENT
          key: oracle.dbfiles_limit
          delay: '0'
          history: 7d
          description: 'Max opened datafiles.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.METRIC==''SYSPARAM::db_files'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          tags:
            - tag: Application
              value: Oracle
        - uuid: 2e628dbe6572439a83c2a44e827a751b
          name: 'Oracle: DATABASE, Size'
          type: DEPENDENT
          key: oracle.db_size
          delay: '0'
          history: 7d
          units: B
          description: 'Database size.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.METRIC==''DATABASE::Size'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          tags:
            - tag: Application
              value: Oracle
        - uuid: ddd4f65b30144f4ab0eb2475c10f882b
          name: 'Oracle: FRA, Free space'
          type: DEPENDENT
          key: oracle.fra_space_free
          delay: '0'
          history: 7d
          units: B
          description: 'Free space in FRA.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.METRIC==''FRA::Space Free'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
        - uuid: a5d728fd2c9a45a5a35e6d76927ee55f
          name: 'Oracle: FRA, Space limit'
          type: DEPENDENT
          key: oracle.fra_space_limit
          delay: '0'
          history: 7d
          units: B
          description: 'Maximum amount of disk space (in bytes) that the database can use for the fast recovery area.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.METRIC==''FRA::Space Limit'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
        - uuid: 2dcf430c92774d4eb3643798eae7e2a0
          name: 'Oracle: FRA, Used space'
          type: DEPENDENT
          key: oracle.fra_space_used
          delay: '0'
          history: 7d
          units: B
          description: 'Amount of disk space (in bytes) used by fast recovery area files created in current and all previous fast recovery areas.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.METRIC==''FRA::Space Used'')].VALUE.first()'
          master_item:
            key: 'db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
        - uuid: 914c69ec6f7f451c80fe7d671e7835f9
          name: 'Oracle: STB, Transfer Lag'
          type: DEPENDENT
          key: oracle.lag_seq
          delay: '0'
          history: 7d
          value_type: FLOAT
          description: |
