        - macro: '{$ORACLE_ALOG_BACKUP_CRIT}'
          value: 8h
          description: 'Archivelog Backup Threashold.'
        - macro: '{$ORACLE_ALOG_BACKUP_WARN}'
          value: 4h
          description: 'Archivelog Backup Threashold.'
        - macro: '{$ORACLE_CF_BACKUP_CRIT}'
          value: 8h
          description: 'Controlfile Backup Threashold.'
        - macro: '{$ORACLE_CF_BACKUP_WARN}'
          value: 4h
