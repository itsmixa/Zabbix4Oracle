      discovery_rules:
        - uuid: 2f8b37f82f4540eca5960828989fbd13
          name: 'Archive log discovery'
          type: ODBC
          key: 'db.odbc.discovery[archivelog,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 1h
          params: |
            SELECT d.dest_name
            FROM v$archive_dest d , v$database db WHERE d.status != 'INACTIVE' AND db.log_mode = 'ARCHIVELOG' and db.DATABASE_ROLE='PRIMARY';
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Archive logs destinations.'
          item_prototypes:
            - uuid: 95463306eb6544d58443cdca7382310f
              name: 'Archivelog ''{#DEST_NAME}'': Error'
              type: DEPENDENT
              key: 'oracle.archivelog_error["{#DEST_NAME}"]'
              delay: '0'
              history: 7d
              value_type: TEXT
              trends: '0'
              description: 'Displays the error text.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DEST_NAME==''{#DEST_NAME}'')].ERROR.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'db.odbc.get[get_archivelog_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: ArchiveDests
            - uuid: ad85361248a143c1bda5855608609686
              name: 'Archivelog ''{#DEST_NAME}'': Last sequence'
              type: DEPENDENT
              key: 'oracle.archivelog_log_sequence["{#DEST_NAME}"]'
              delay: '0'
              history: 7d
              description: 'The last archivelog sequence number has been archived.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DEST_NAME==''{#DEST_NAME}'')].LOG_SEQUENCE.first()'
              master_item:
                key: 'db.odbc.get[get_archivelog_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: ArchiveDest
            - uuid: cb48a562a86b4b5ab6c0e20231396d95
              name: 'Archivelog ''{#DEST_NAME}'': Status'
              type: DEPENDENT
              key: 'oracle.archivelog_log_status["{#DEST_NAME}"]'
              delay: '0'
              history: 7d
              description: 'The current status of the destination: 3 - ''Valid'', 2 - ''Deferred'',1 - ''Error'', 0 - ''Unknown'''
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DEST_NAME==''{#DEST_NAME}'')].STATUS.first()'
              master_item:
                key: 'db.odbc.get[get_archivelog_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: ArchiveDest
            - uuid: 6de6326eff074da396efde5241b59fd5
              name: 'Archivelog ''{#DEST_NAME}'': Transfer Lag'
              type: DEPENDENT
              key: 'oracle.archivelog_log_transfer_lag["{#DEST_NAME}"]'
              delay: '0'
              history: 7d
              value_type: FLOAT
              description: 'Lag between transferred log sequence and the last local archined log.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DEST_NAME==''{#DEST_NAME}'')].TRANSFER_LAG.first()'
              master_item:
                key: 'db.odbc.get[get_archivelog_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: ArchiveDest
              trigger_prototypes:
                - uuid: 2e842d8567174426a9b9e8aa562be254
                  expression: 'min(/Oracle MX v.0.2/oracle.archivelog_log_transfer_lag["{#DEST_NAME}"],30m)>{$ORACLE_ARCHIVELOG_TRANSFER_LAG_CRIT:"{#DEST_NAME}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Oracle MX v.0.2/oracle.archivelog_log_transfer_lag["{#DEST_NAME}"])<{$ORACLE_ARCHIVELOG_TRANSFER_LAG_CRIT:"{#DEST_NAME}"}'
                  name: 'Archivelog transfer lag ''{#DEST_NAME}'' is too high.'
                  opdata: 'Error: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'Transfer lag is too high. Please, check out your standby destination.'
          trigger_prototypes:
            - uuid: 031fb8c6a8e14874ba54108ba2c28cae
              expression: 'max(/Oracle MX v.0.2/oracle.archivelog_log_status["{#DEST_NAME}"],30m)<2 and length(last(/Oracle MX v.0.2/oracle.archivelog_error["{#DEST_NAME}"]))>5'
              name: 'Archivelog destination ''{#DEST_NAME}'' is not valid.'
              opdata: 'Error: {ITEM.LASTVALUE2}'
              priority: HIGH
              description: 'Log destination is not in 3 - Valid or 2 - Deferred.'
        - uuid: c543482a11b54d148feec63566463491
          name: 'ASM disk groups discovery'
          type: ODBC
          key: 'db.odbc.discovery[asm,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 1h
          params: 'SELECT name AS dg_name FROM v$asm_diskgroup;'
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'ASM disk groups'
          item_prototypes:
            - uuid: 8101d26728f9408ca2610c55b23a5c47
              name: 'ASM ''{#DG_NAME}'': Free size'
              type: DEPENDENT
              key: 'oracle.asm_free_size["{#DG_NAME}"]'
              delay: '0'
              history: 7d
              units: B
              description: 'Free size of ASM disk group.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DG_NAME==''{#DG_NAME}'')].FREE_SIZE_BYTE.first()'
              master_item:
                key: 'db.odbc.get[get_asm_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle ASM'
              trigger_prototypes:
                - uuid: 04cc00d37c40490ea697c61a75c62586
                  expression: 'last(/Oracle MX v.0.2/oracle.asm_free_size["{#DG_NAME}"])<{$ORACLE_ASM_FREESPACE_MB_CRIT:"{#DG_NAME}"}'
                  name: 'ASM ''{#DG_NAME}'': Disk group usage is too high (over{$ORACLE_ASM_FREESPACE_MB_CRIT:"{#DG_NAME}"})'
                  opdata: 'last: {ITEM.LASTVALUE1}, threshold: {$ORACLE_ASM_FREESPACE_MB_CRIT:"{#DG_NAME}"}'
                  priority: HIGH
                  description: 'Make some free space in the Disk Group.'
                - uuid: 1a565ee65b6840098c51aa33bdb99b49
                  expression: 'last(/Oracle MX v.0.2/oracle.asm_free_size["{#DG_NAME}"])<{$ORACLE_ASM_FREESPACE_MB_WARN:"{#DG_NAME}"}'
                  name: 'ASM ''{#DG_NAME}'': Disk group usage is too high (over {$ORACLE_ASM_FREESPACE_MB_WARN:"{#DG_NAME}"})'
                  opdata: 'last: {ITEM.LASTVALUE1}, threshold: {$ORACLE_ASM_FREESPACE_MB_WARN:"{#DG_NAME}"}'
                  priority: WARNING
                  description: 'Make some free space in the Disk Group.'
                  dependencies:
                    - name: 'ASM ''{#DG_NAME}'': Disk group usage is too high (over{$ORACLE_ASM_FREESPACE_MB_CRIT:"{#DG_NAME}"})'
                      expression: 'last(/Oracle MX v.0.2/oracle.asm_free_size["{#DG_NAME}"])<{$ORACLE_ASM_FREESPACE_MB_CRIT:"{#DG_NAME}"}'
            - uuid: be464f074ded4260815fc36df4320fb7
              name: 'ASM ''{#DG_NAME}'': Total size'
              type: DEPENDENT
              key: 'oracle.asm_total_size["{#DG_NAME}"]'
              delay: '0'
              history: 7d
              units: B
              description: 'Total size of ASM disk group.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DG_NAME==''{#DG_NAME}'')].SIZE_BYTE.first()'
              master_item:
                key: 'db.odbc.get[get_asm_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle ASM'
            - uuid: e0aed8c3b8f3489ba342a2d535ba5979
              name: 'ASM ''{#DG_NAME}'': Used size'
              type: DEPENDENT
              key: 'oracle.asm_used_size["{#DG_NAME}"]'
              delay: '0'
              history: 7d
              units: B
              description: 'Used size of ASM disk group.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DG_NAME==''{#DG_NAME}'')].USED_BYTE.first()'
              master_item:
                key: 'db.odbc.get[get_asm_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle ASM'
        - uuid: cc30770914e640faa4ad55d7b6456b21
          name: 'Tablespace discovery'
          type: ODBC
          key: 'db.odbc.discovery[tbsname,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
          delay: 1h
          params: 'select tablespace_name tablespace,contents from dba_tablespaces;'
          username: '{$ORACLE.USER}'
          password: '{$ORACLE.PASSWORD}'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#TABLESPACE}'
                value: '{$ORACLE.TABLESPACE.NAME.MATCHES}'
                formulaid: A
              - macro: '{#TABLESPACE}'
                value: '{$ORACLE.TABLESPACE.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Scanning tablespaces in DBMS.'
          item_prototypes:
            - uuid: 2d2d4eb787e04eed893d4c28454f41a9
              name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace allocated, bytes'
              type: DEPENDENT
              key: 'oracle.tbs_alloc_bytes["{#TABLESPACE}"]'
              delay: '0'
              history: 7d
              units: B
              description: 'Currently allocated bytes for the tablespace (sum of the current size of the datafiles).'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.TABLESPACE==''{#TABLESPACE}'')].FILE_BYTES.first()'
              master_item:
                key: 'db.odbc.get[get_tablespaces_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle {#CONTENTS} Tablespaces. {#TABLESPACE}'
            - uuid: 5e8f8fd546bd421ba80f7430ddb6f7ba
              name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace free, bytes'
              type: DEPENDENT
              key: 'oracle.tbs_free_bytes["{#TABLESPACE}"]'
              delay: '0'
              history: 7d
              units: B
              description: 'Free bytes of allocated space.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.TABLESPACE==''{#TABLESPACE}'')].FREE_BYTES.first()'
              master_item:
                key: 'db.odbc.get[get_tablespaces_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle {#CONTENTS} Tablespaces. {#TABLESPACE}'
            - uuid: 9f821997dba743e9bc1d9db48e9ba65f
              name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace MAX size, bytes'
              type: DEPENDENT
              key: 'oracle.tbs_max_bytes["{#TABLESPACE}"]'
              delay: '0'
              history: 7d
              units: B
              description: 'Maximum size of tablespace.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.TABLESPACE==''{#TABLESPACE}'')].MAX_BYTES.first()'
              master_item:
                key: 'db.odbc.get[get_tablespaces_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle {#CONTENTS} Tablespaces. {#TABLESPACE}'
            - uuid: d03a9a8a99014353af7b683feddfc1a4
              name: 'Oracle TBS ''{#TABLESPACE}'': Open status'
              type: DEPENDENT
              key: 'oracle.tbs_status["{#TABLESPACE}"]'
              delay: '0'
              history: 7d
              description: 'Tablespace status. 1 - ''ONLINE'' 2 - ''OFFLINE'' 3- ''READ ONLY'''
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.TABLESPACE==''{#TABLESPACE}'')].STATUS.first()'
              master_item:
                key: 'db.odbc.get[get_tablespaces_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle {#CONTENTS} Tablespaces. {#TABLESPACE}'
              trigger_prototypes:
                - uuid: 90b4cbaa98aa484e8c8ddfc35ab76686
                  expression: 'last(/Oracle MX v.0.2/oracle.tbs_status["{#TABLESPACE}"])=2'
                  name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace is OFFLINE'
                  priority: WARNING
                  description: 'The tablespace is in the offline state.'
            - uuid: 7437884350054f9780b2770a6214862c
              name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace used, bytes'
              type: DEPENDENT
              key: 'oracle.tbs_used_bytes["{#TABLESPACE}"]'
              delay: '0'
              history: 7d
              units: B
              description: 'Currently used bytes of the tablespace (current size of datafiles-free space).'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.TABLESPACE==''{#TABLESPACE}'')].USED_BYTES.first()'
              master_item:
                key: 'db.odbc.get[get_tablespaces_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle {#CONTENTS} Tablespaces. {#TABLESPACE}'
            - uuid: 61b98eeb46f24ed88bd2bccc8f267406
              name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace usage, percent'
              type: DEPENDENT
              key: 'oracle.tbs_used_file_pct["{#TABLESPACE}"]'
              delay: '0'
              history: 7d
              units: '%'
              description: 'Used bytes/Allocated bytes*100'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.TABLESPACE==''{#TABLESPACE}'')].USED_MAX_PCT.first()'
              master_item:
                key: 'db.odbc.get[get_tablespaces_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]'
              tags:
                - tag: Application
                  value: 'Oracle {#CONTENTS} Tablespaces. {#TABLESPACE}'
          trigger_prototypes:
            - uuid: 67f24cdcb5584de18692397255fe68d5
              expression: 'last(/Oracle MX v.0.2/oracle.tbs_free_bytes["{#TABLESPACE}"])<{$ORACLE_TBS_FREESPACE_MB_WARN:"{#TABLESPACE}"} and last(/Oracle MX v.0.2/oracle.tbs_max_bytes["{#TABLESPACE}"])>0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Oracle MX v.0.2/oracle.tbs_free_bytes["{#TABLESPACE}"])>{$ORACLE_TBS_FREESPACE_MB_WARN:"{#TABLESPACE}"} or last(/Oracle MX v.0.2/oracle.tbs_status["{#TABLESPACE}"])=2 or last(/Oracle MX v.0.2/oracle.tbs_status["{#TABLESPACE}"])=3'
              name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace utilization is high.'
              opdata: 'free: {ITEM.LASTVALUE1}, size: {ITEM.LASTVALUE2}, threshold {$ORACLE_TBS_FREESPACE_MB_WARN:"{#TABLESPACE}"}'
              priority: WARNING
              description: 'Free space in the tablespace ''{#TABLESPACE}'' less then {$ORACLE_TBS_FREESPACE_MB_WARN:"{#TABLESPACE}"}. Add some space.'
              dependencies:
                - name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace utilization is too high.'
                  expression: 'last(/Oracle MX v.0.2/oracle.tbs_free_bytes["{#TABLESPACE}"])<{$ORACLE_TBS_FREESPACE_MB_CRIT:"{#TABLESPACE}"} and last(/Oracle MX v.0.2/oracle.tbs_max_bytes["{#TABLESPACE}"])>0'
                  recovery_expression: 'last(/Oracle MX v.0.2/oracle.tbs_free_bytes["{#TABLESPACE}"])>{$ORACLE_TBS_FREESPACE_MB_CRIT:"{#TABLESPACE}"} or last(/Oracle MX v.0.2/oracle.tbs_status["{#TABLESPACE}"])=2 or last(/Oracle MX v.0.2/oracle.tbs_status["{#TABLESPACE}"])=3'
              tags:
                - tag: Free
                  value: '{ITEM.LASTVALUE1}'
            - uuid: d39be272b33145ce991f54b06621cff5
              expression: 'last(/Oracle MX v.0.2/oracle.tbs_free_bytes["{#TABLESPACE}"])<{$ORACLE_TBS_FREESPACE_MB_CRIT:"{#TABLESPACE}"} and last(/Oracle MX v.0.2/oracle.tbs_max_bytes["{#TABLESPACE}"])>0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Oracle MX v.0.2/oracle.tbs_free_bytes["{#TABLESPACE}"])>{$ORACLE_TBS_FREESPACE_MB_CRIT:"{#TABLESPACE}"} or last(/Oracle MX v.0.2/oracle.tbs_status["{#TABLESPACE}"])=2 or last(/Oracle MX v.0.2/oracle.tbs_status["{#TABLESPACE}"])=3'
              name: 'Oracle TBS ''{#TABLESPACE}'': Tablespace utilization is too high.'
              opdata: 'free: {ITEM.LASTVALUE1}, size: {ITEM.LASTVALUE2}, threshold {$ORACLE_TBS_FREESPACE_MB_CRIT:"{#TABLESPACE}"}'
              priority: HIGH
              description: 'Free space in the tablespace ''{#TABLESPACE}'' is less then {$ORACLE_TBS_FREESPACE_MB_CRIT:"{#TABLESPACE}"}. Add some space.'
              manual_close: 'YES'
              tags:
                - tag: Free
                  value: '{ITEM.LASTVALUE1}'
      macros:
        - macro: '{$ACTIVE_SESSIONS_CRIT}'
          value: '30'
          description: 'Active sessions count threshold.'
        - macro: '{$ACTIVE_SESSIONS_WARN}'
          value: '20'
          description: 'Active sessions count threshold.'
        - macro: '{$ORACLE.DRIVER}'
          value: /usr/lib/oracle/19.29/client64/libsqora.so.19.1
          description: 'Oracle driver path. e.g /usr/lib/oracle/21/client64/lib/libsqora.so.21.1'
        - macro: '{$ORACLE.FRA_FREESPACE_CRIT}'
          value: 100G
          description: 'Free space in FRA (critical)'
        - macro: '{$ORACLE.FRA_FREESPACE_WARN}'
          value: 200G
          description: 'Free space in FRA (warning)'
        - macro: '{$ORACLE.HOST}'
          value: '<Put IP address here>'
