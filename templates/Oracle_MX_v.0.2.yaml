        - macro: '{$ORACLE_L1_BACKUP_WARN}'
          value: 2d
          description: 'Incremental Level 1 Backup Threashold.'
        - macro: '{$ORACLE_STANDBY_TRANSFER_LAG}'
          value: '5'
