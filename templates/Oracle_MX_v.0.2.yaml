        - macro: '{$STANDBY_APPLY_LAG_CRIT}'
          value: '600'
        - macro: '{$STANDBY_APPLY_LAG_WARN}'
          value: '60'
        - macro: '{$STANDBY_TRANSPORT_LAG_CRIT}'
          value: '600'
        - macro: '{$STANDBY_TRANSPORT_LAG_WARN}'
          value: '60'
  triggers:
    - uuid: e2bbdbdecb3b4b7abae35257fd4a848b
      expression: 'last(/Oracle MX v.0.2/oracle.fra_space_free)<{$ORACLE.FRA_FREESPACE_WARN} and last(/Oracle MX v.0.2/oracle.fra_space_limit)>0'
      name: 'Oracle: FRA utilization is high (less then {$ORACLE.FRA_FREESPACE_WARN}).'
      opdata: 'current: {ITEM.LASTVALUE1}, threshold: {$ORACLE.FRA_FREESPACE_WARN}, FRA size: {ITEM.LASTVALUE2}, alert started: {ITEM.VALUE1}'
      priority: WARNING
      description: 'Lack of free space in the FRA.'
      dependencies:
        - name: 'Oracle: FRA utilization is too high (less then {$ORACLE.FRA_FREESPACE_CRIT}).'
          expression: 'last(/Oracle MX v.0.2/oracle.fra_space_free)<{$ORACLE.FRA_FREESPACE_CRIT} and last(/Oracle MX v.0.2/oracle.fra_space_limit)>0'
    - uuid: cb792e02466b401aae7d026319668ad8
      expression: 'last(/Oracle MX v.0.2/oracle.fra_space_free)<{$ORACLE.FRA_FREESPACE_CRIT} and last(/Oracle MX v.0.2/oracle.fra_space_limit)>0'
      name: 'Oracle: FRA utilization is too high (less then {$ORACLE.FRA_FREESPACE_CRIT}).'
      opdata: 'current: {ITEM.LASTVALUE1}, threshold: {$ORACLE.FRA_FREESPACE_CRIT}, FRA size: {ITEM.LASTVALUE2}, alert started: {ITEM.VALUE1}'
